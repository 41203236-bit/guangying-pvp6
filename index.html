<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>光影對決｜房間等待</title>
<style>
  :root{
    --bg0:#060812;
    --bg1:#091226;
    --bg2:#160d2c;
    --cyan:#67e8ff;
    --cyan2:#00c2ff;
    --gold:#ffd86b;
    --violet:#8d6bff;
    --pink:#ff5ecb;
    --panel:rgba(10,14,30,.60);
    --panel-2:rgba(9,13,27,.78);
    --line:rgba(255,255,255,.13);
    --glowA:rgba(0,194,255,.22);
    --glowB:rgba(255,216,107,.14);
    --glowC:rgba(141,107,255,.18);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft JhengHei",sans-serif;background:radial-gradient(circle at 20% 15%, rgba(0,194,255,.12), transparent 22%),radial-gradient(circle at 85% 18%, rgba(141,107,255,.16), transparent 24%),radial-gradient(circle at 70% 82%, rgba(255,216,107,.10), transparent 18%),linear-gradient(135deg,var(--bg0),var(--bg1) 48%,var(--bg2));color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  body::before{content:"";position:fixed;inset:-12%;background:conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(0,194,255,.09) 48deg, transparent 105deg, rgba(255,216,107,.07) 150deg, transparent 220deg, rgba(141,107,255,.09) 310deg, transparent 360deg);filter:blur(60px);animation:spinGlow 22s linear infinite;z-index:-4;opacity:.7}
  @keyframes spinGlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .bg{position:fixed;inset:0;background:linear-gradient(rgba(7,10,22,.70),rgba(7,10,22,.78)),url('Gemini_Generated_Image_axefmzaxefmzaxef.jpg') center/cover no-repeat;filter:brightness(.62) saturate(1.08);z-index:-3;}
  .bg::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 25% 25%, rgba(103,232,255,.16), transparent 24%),radial-gradient(circle at 78% 25%, rgba(141,107,255,.14), transparent 20%),radial-gradient(circle at 60% 78%, rgba(255,216,107,.12), transparent 18%);mix-blend-mode:screen;opacity:.9}
  .bg::after{content:"";position:absolute;inset:-20%;background:linear-gradient(115deg, transparent 38%, rgba(255,255,255,.06) 47%, rgba(103,232,255,.13) 50%, rgba(255,255,255,.04) 53%, transparent 62%);transform:translateX(-45%) rotate(4deg);animation:scanSweep 8.6s ease-in-out infinite;opacity:.65}
  @keyframes scanSweep{0%,100%{transform:translateX(-48%) rotate(4deg)}50%{transform:translateX(48%) rotate(4deg)}}
  .noise{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.08;background-image:radial-gradient(rgba(255,255,255,.7) 0.7px, transparent 0.7px);background-size:18px 18px;mix-blend-mode:screen}
  .shell{position:relative;width:min(95vw,1180px);padding:34px;overflow:hidden;background:linear-gradient(180deg,rgba(11,17,35,.58),rgba(7,11,24,.74));border:1px solid rgba(255,255,255,.14);border-radius:34px;backdrop-filter:blur(16px);box-shadow:0 30px 80px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08), 0 0 0 1px rgba(103,232,255,.06);}
  .shell::before{content:"";position:absolute;inset:0;border-radius:34px;padding:1px;background:linear-gradient(135deg,rgba(103,232,255,.55),rgba(255,216,107,.30),rgba(141,107,255,.35),rgba(103,232,255,.18));-webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.85;pointer-events:none}
  .shell-glow{position:absolute;border-radius:999px;filter:blur(36px);pointer-events:none;opacity:.55}
  .shell-glow-a{width:240px;height:240px;background:var(--glowA);top:-70px;left:-50px}
  .shell-glow-b{width:230px;height:230px;background:var(--glowC);right:-50px;bottom:-80px}
  .title-wrap{position:relative;text-align:center;padding:10px 10px 26px;overflow:hidden}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);font-size:.9rem;letter-spacing:2px;color:rgba(255,255,255,.72)}
  .eyebrow::before,.eyebrow::after{content:"";display:block;width:18px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
  h1{position:relative;margin:16px 0 10px;font-size:clamp(3rem,6.4vw,5.3rem);line-height:1;letter-spacing:8px;font-weight:900;background:linear-gradient(90deg, #dffcff 0%, #6ce7ff 16%, #ffd86b 36%, #b0f3ff 50%, #a47cff 70%, #f0f8ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 18px rgba(103,232,255,.18), 0 0 28px rgba(141,107,255,.10);}
  .title-shine{position:absolute;left:-12%;top:26px;width:34%;height:88px;background:linear-gradient(115deg, transparent 8%, rgba(255,255,255,.02) 30%, rgba(255,255,255,.28) 48%, rgba(103,232,255,.18) 52%, transparent 72%);transform:skewX(-18deg);filter:blur(1px);animation:titleSweep 5.8s ease-in-out infinite;pointer-events:none}
  @keyframes titleSweep{0%,100%{transform:translateX(-10%) skewX(-18deg);opacity:0}20%{opacity:.35}50%{transform:translateX(240%) skewX(-18deg);opacity:.85}70%{opacity:0}}
  .sub{opacity:.88;text-align:center;font-size:1.12rem;letter-spacing:1px;color:rgba(255,255,255,.78)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:stretch}
  .card{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.10);border-radius:28px;padding:28px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 16px 34px rgba(0,0,0,.28)}
  .card::before{content:"";position:absolute;inset:0;background:linear-gradient(130deg, rgba(103,232,255,.09), transparent 24%, transparent 70%, rgba(141,107,255,.08));pointer-events:none}
  .card h2{margin:0 0 18px;font-size:1.55rem;display:flex;align-items:center;gap:12px;letter-spacing:2px}
  .card h2::before{content:"";display:block;width:6px;height:28px;border-radius:999px;background:linear-gradient(180deg,var(--cyan),var(--gold));box-shadow:0 0 12px rgba(103,232,255,.34)}
  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  input,select,button{height:60px;border-radius:18px;border:1px solid rgba(255,255,255,.14);padding:0 18px;font-size:1.12rem;transition:all .25s ease;outline:none}
  input,select{background:linear-gradient(180deg,rgba(0,0,0,.44),rgba(17,22,40,.68));color:#fff;flex:1;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
  input::placeholder{color:rgba(255,255,255,.38)}
  input:focus,select:focus{border-color:rgba(103,232,255,.5);box-shadow:0 0 0 3px rgba(103,232,255,.12), inset 0 1px 0 rgba(255,255,255,.04)}
  button{position:relative;overflow:hidden;background:linear-gradient(135deg, rgba(0,194,255,.95), rgba(0,114,255,.95) 54%, rgba(141,107,255,.92));color:#fff;font-weight:900;letter-spacing:1px;cursor:pointer;box-shadow:0 10px 22px rgba(0,114,255,.24), inset 0 1px 0 rgba(255,255,255,.16)}
  button::after{content:"";position:absolute;inset:-40% 55% -40% -30%;background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,.30) 48%, transparent 72%);transform:translateX(-120%) skewX(-18deg);transition:transform .65s ease;pointer-events:none}
  button:hover{transform:translateY(-2px) scale(1.02);filter:brightness(1.06)}
  button:hover::after{transform:translateX(220%) skewX(-18deg)}
  button.secondary{background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.05));color:rgba(255,255,255,.92);box-shadow:none}
  button:disabled{opacity:.42;cursor:not-allowed;transform:none;filter:none;box-shadow:none}
  button:disabled::after{display:none}
  .roomcode{font-size:2.2rem;font-weight:900;color:var(--gold);letter-spacing:4px;text-shadow:0 0 12px rgba(255,216,107,.28)}
  .role-tag{color:var(--cyan);text-shadow:0 0 10px rgba(103,232,255,.22)}
  .meta-line{font-size:1.15rem;color:rgba(255,255,255,.9)}
  .state-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px}
  .state-box{position:relative;padding:18px 16px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.035));text-align:center;font-size:1.08rem;border:1px solid rgba(255,255,255,.08);overflow:hidden}
  .state-box::before{content:"";position:absolute;inset:auto -20% -65% -20%;height:120px;background:radial-gradient(circle, rgba(255,255,255,.14), transparent 58%);opacity:.18;pointer-events:none}
  .state-box strong{display:block;margin-bottom:10px;font-size:1.2rem;letter-spacing:1px}
  .ok{color:#7CFFB2;font-weight:900;text-shadow:0 0 12px rgba(124,255,178,.35)}
  .warn{color:#ffd166;font-weight:900;text-shadow:0 0 10px rgba(255,209,102,.24)}
  .bad{color:#ff8f8f;font-weight:900;text-shadow:0 0 10px rgba(255,143,143,.22)}
  .state-box.ready{background:linear-gradient(180deg,rgba(124,255,178,.14),rgba(124,255,178,.05));border-color:rgba(124,255,178,.28);box-shadow:0 0 22px rgba(124,255,178,.10)}
  .footer-controls{align-items:stretch}
  .ready-main{flex:2;height:72px;font-size:1.45rem}
  .leave-btn{flex:1;height:72px}
  .status{margin-top:24px;padding:18px 20px;border-radius:20px;background:linear-gradient(135deg,rgba(0,194,255,.13),rgba(141,107,255,.08));border:1px solid rgba(103,232,255,.26);min-height:28px;font-size:1.08rem;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .countdown{margin-top:18px;font-size:4rem;font-weight:900;text-align:center;color:#00d4ff;display:none;text-shadow:0 0 18px rgba(0,194,255,.32)}
  .tips{margin-top:24px;opacity:.84;font-size:1rem;line-height:1.8;background:linear-gradient(180deg,rgba(0,0,0,.24),rgba(255,255,255,.02));padding:15px 16px;border-radius:18px;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.72)}
  .card-deco{position:absolute;border-radius:999px;filter:blur(32px);pointer-events:none;opacity:.42}
  .deco-a{width:120px;height:120px;background:rgba(0,194,255,.18);top:-20px;right:-20px}
  .deco-b{width:90px;height:90px;background:rgba(255,216,107,.16);bottom:-18px;left:10%}
  .deco-c{width:110px;height:110px;background:rgba(141,107,255,.20);top:18px;right:-24px}
  .deco-d{width:100px;height:100px;background:rgba(0,194,255,.16);bottom:-30px;left:-8px}
  @media (max-width:980px){.row{grid-template-columns:1fr}.shell{padding:24px}h1{letter-spacing:4px}.title-shine{display:none}}

  .audio-panel{position:fixed;left:18px;top:18px;z-index:12000;width:min(280px,calc(100vw - 36px));padding:14px 14px 12px;border-radius:18px;background:linear-gradient(180deg,rgba(11,17,35,.84),rgba(7,11,24,.88));border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(14px);box-shadow:0 18px 40px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06)}
  .audio-panel h3{margin:0 0 10px;font-size:1rem;letter-spacing:2px;color:rgba(255,255,255,.85)}
  .audio-row{display:grid;grid-template-columns:72px 1fr 42px;gap:10px;align-items:center;margin:8px 0}
  .audio-row label{font-size:.92rem;color:rgba(255,255,255,.82)}
  .audio-row input[type=range]{width:100%;height:8px;border:none;accent-color:#67e8ff;background:transparent;padding:0}
  .audio-row output{font-size:.9rem;color:#ffd86b;text-align:right}
  .tap-start{position:fixed;inset:0;z-index:15000;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 50%, rgba(16,24,48,.42), rgba(3,6,16,.92) 58%), linear-gradient(135deg,#050812,#0b1226,#180d2d);cursor:pointer;transition:opacity .45s ease, visibility .45s ease}
  .tap-start.hide{opacity:0;visibility:hidden}
  .tap-card{position:relative;min-width:min(86vw,720px);padding:42px 34px;border-radius:28px;text-align:center;background:linear-gradient(180deg,rgba(11,17,35,.72),rgba(7,11,24,.88));border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px);box-shadow:0 24px 60px rgba(0,0,0,.36)}
  .tap-card::before{content:"";position:absolute;inset:0;border-radius:28px;padding:1px;background:linear-gradient(135deg,rgba(103,232,255,.5),rgba(255,216,107,.28),rgba(141,107,255,.36),rgba(103,232,255,.18));-webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  .tap-card h2{margin:0 0 10px;font-size:clamp(2.4rem,5.4vw,4.4rem);letter-spacing:8px;font-weight:900;background:linear-gradient(90deg,#dffcff 0%,#6ce7ff 18%,#ffd86b 44%,#a47cff 78%,#f0f8ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 18px rgba(103,232,255,.18)}
  .tap-card p{margin:10px 0 0;font-size:1.05rem;color:rgba(255,255,255,.82);letter-spacing:2px}
  .tap-card .hint{display:inline-block;margin-top:18px;padding:12px 18px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);animation:tapPulse 1.8s ease-in-out infinite}
  @keyframes tapPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 rgba(103,232,255,0)}50%{transform:scale(1.03);box-shadow:0 0 24px rgba(103,232,255,.18)}}

</style>
</head>
<body>
<div class="bg"></div>
<div class="noise"></div>
<div id="tapStart" class="tap-start">
  <div class="tap-card">
    <h2>光影對決</h2>
    <p>點擊任意位置進入菜單</p>
    <div class="hint">CLICK ANYWHERE TO ENTER</div>
  </div>
</div>
<div class="audio-panel" id="audioPanel">
  <h3>音效設定</h3>
  <div class="audio-row"><label for="bgmVolume">音樂</label><input id="bgmVolume" type="range" min="0" max="100" step="1" value="65"><output id="bgmOut">65%</output></div>
  <div class="audio-row"><label for="sfxVolume">音效</label><input id="sfxVolume" type="range" min="0" max="100" step="1" value="75"><output id="sfxOut">75%</output></div>
</div>

<div class="shell">
  <div class="shell-glow shell-glow-a"></div>
  <div class="shell-glow shell-glow-b"></div>
  <div class="title-wrap">
    <div class="eyebrow">LIGHT × SHADOW CYBER ARENA</div>
    <h1>光影對決</h1>
    <div class="title-shine"></div>
    <div class="sub">先進房、再準備，雙方完成後才進入戰鬥頁</div>
  </div>
  <div class="row">
    <div class="card card-action">
      <div class="card-deco deco-a"></div>
      <div class="card-deco deco-b"></div>
      <div>
        <h2>房間操作</h2>
        <div class="controls">
          <select id="roleSelect">
            <option value="O">光 / O (主動方)</option>
            <option value="X">影 / X (守護方)</option>
          </select>
          <button id="createBtn">建立新房間</button>
        </div>
        <div class="controls controls-join" style="margin-top:15px">
          <input id="roomInput" placeholder="輸入房號" maxlength="8" />
          <button id="joinBtn">加入房間</button>
          <button id="copyBtn" class="secondary">複製</button>
        </div>
      </div>
      <div class="tips">💡 規則：房主建立房間後，另一位玩家輸入房號加入。雙方都點擊「準備」後，戰鬥將在倒數後自動開始。</div>
    </div>
    <div class="card card-status">
      <div class="card-deco deco-c"></div>
      <div class="card-deco deco-d"></div>
      <h2>目前狀態</h2>
      <div class="meta-line">房號：<span id="roomCode" class="roomcode">未建立</span></div>
      <div class="meta-line" style="margin-top:12px;">你的身份：<strong id="myRoleText" class="role-tag">未加入</strong></div>
      <div class="state-grid">
        <div class="state-box" id="boxO"><strong>光 / O</strong><div id="statusO" class="warn">等待中</div></div>
        <div class="state-box" id="boxX"><strong>影 / X</strong><div id="statusX" class="warn">等待中</div></div>
      </div>
      <div class="controls footer-controls" style="margin-top:25px">
        <button id="readyBtn" class="ready-main" disabled>準備就緒</button>
        <button id="leaveBtn" class="secondary leave-btn" disabled>離開</button>
      </div>
      <div id="statusText" class="status">尚未加入房間</div>
      <div id="countdownText" class="countdown">3</div>
    </div>
  </div>
</div>
<script type="module" src="./lobby.js"></script>
</body>
</html>
